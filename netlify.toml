[build]
  command = "npm ci && npm run build"
  publish = "build/"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/og/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
